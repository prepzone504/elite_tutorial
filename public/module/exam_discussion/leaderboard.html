<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All-Time Leaderboard | Elite Tutorial</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/sidebar.css" />
    <style>
      :root {
        --bg-dark: #080808;
        --border-light: rgba(255, 255, 255, 0.1);
        --accent-primary: #e01c1c;
        --accent-gold: #fbbf24;
        --text-main: #f3f4f6;
        --text-muted: #9ca3af;
      }
      body {
        font-family: 'Outfit', sans-serif;
        background: var(--bg-dark);
        color: var(--text-main);
        margin: 0;
        display: flex;
        min-height: 100vh;
      }
      .main-content {
        flex: 1;
        margin-left: 260px; /* Sidebar width */
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .leaderboard-container {
        width: 100%;
        max-width: 800px;
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
      }
      .leaderboard-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 32px;
        border-bottom: 1px solid var(--border-light);
        padding-bottom: 24px;
      }
      .leaderboard-title {
        font-size: 2rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        gap: 12px;
        background: linear-gradient(135deg, #fff, #a0a0a0);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .leaderboard-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .leaderboard-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 16px;
        padding: 16px 24px;
        transition: transform 0.2s, background 0.2s;
      }
      .leaderboard-item:hover {
        transform: translateY(-2px);
        background: rgba(255, 255, 255, 0.08);
      }
      .rank-1 { border-color: var(--accent-gold); background: rgba(251, 191, 36, 0.05); }
      .rank-2 { border-color: #94a3b8; background: rgba(148, 163, 184, 0.05); }
      .rank-3 { border-color: #b45309; background: rgba(180, 83, 9, 0.05); }
      
      .item-left { display: flex; align-items: center; gap: 20px; }
      .item-rank { font-size: 1.5rem; font-weight: 800; width: 40px; text-align: center; }
      .rank-1 .item-rank { color: var(--accent-gold); }
      .rank-2 .item-rank { color: #94a3b8; }
      .rank-3 .item-rank { color: #b45309; }
      
      .item-user { display: flex; align-items: center; gap: 16px; }
      .item-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--border-light); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
      .item-name { font-size: 1.2rem; font-weight: 600; color: #fff; }
      .item-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
      
      .item-right { text-align: right; }
      .item-score { font-size: 1.5rem; font-weight: 800; color: var(--accent-primary); font-family: monospace; }
      .item-score-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

      .back-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-light);
        color: #fff;
        padding: 10px 20px;
        border-radius: 50px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: inherit;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.2s;
      }
      .back-btn:hover { background: rgba(255, 255, 255, 0.1); }
      
      @media (max-width: 768px) {
        .main-content { margin-left: 0; padding: 20px; }
        .leaderboard-container { padding: 20px; }
      }
    </style>
</head>
<body>
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
        <div class="leaderboard-container">
            <div class="leaderboard-header">
                <div class="leaderboard-title">
                    <span>🏆</span> All-Time Leaderboard
                </div>
                <a href="#" class="back-btn" onclick="if(window.top !== window.self) { window.parent.postMessage('close-leaderboard', '*'); return false; } else { location.href='exam_discussion_chat_bot.html'; return false; }">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                    Back to Chat
                </a>
            </div>

            <div class="leaderboard-list" id="lb-list">
                <!-- Dynamically loaded -->
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/supabase-client.js"></script>
    <script src="../../js/auth.js"></script>
    <script src="../../js/sidebar.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initSharedSidebar({ activePage: 'exam-discussion', rootPath: '../../' });
            
            const lbList = document.getElementById('lb-list');
            let realtimeChannel = null;

            async function loadLeaderboard() {
                if (!lbList) return;
                lbList.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">Loading ranking...</div>';

                try {
                    const client = window.getSupabaseClient();
                    const session = await client.auth.getSession();
                    const currentUser = session.data?.session?.user;

                    // Fetch all discussion points
                    const { data, error } = await client.from('discussion_points').select('user_id, user_name');
                    if (error) throw error;

                    // Aggregate points
                    const scoresMap = {};
                    (data || []).forEach(row => {
                        if (!scoresMap[row.user_id]) {
                            scoresMap[row.user_id] = { id: row.user_id, name: row.user_name, score: 0 };
                        }
                        scoresMap[row.user_id].score += 1;
                    });

                    // Sort descending by score
                    const sortedUsers = Object.values(scoresMap).sort((a, b) => b.score - a.score);

                    // Render
                    lbList.innerHTML = '';
                    if (sortedUsers.length === 0) {
                        lbList.innerHTML = '<div style="text-align:center; padding: 40px; color: var(--text-muted);">No scores recorded yet. Participate in a discussion to earn points!</div>';
                        return;
                    }

                    sortedUsers.forEach((user, idx) => {
                        const rank = idx + 1;
                        let rankClass = '';
                        if (rank === 1) rankClass = 'rank-1';
                        else if (rank === 2) rankClass = 'rank-2';
                        else if (rank === 3) rankClass = 'rank-3';

                        const isYou = currentUser && currentUser.id === user.id;
                        const isYouStyle = isYou ? 'border-color: var(--accent-primary); background: rgba(224, 28, 28, 0.05);' : '';
                        const youRankColor = isYou && rank > 3 ? 'color: var(--accent-primary);' : '';
                        
                        const avatarInitials = (user.name || 'S').substring(0, 2).toUpperCase();

                        const html = `
                            <div class="leaderboard-item ${rankClass}" style="${isYouStyle}">
                                <div class="item-left">
                                    <div class="item-rank" style="${youRankColor}">${rank}</div>
                                    <div class="item-user">
                                        <div class="item-avatar" style="${isYou ? 'background: rgba(224, 28, 28, 0.2); color: var(--accent-primary);' : ''}">${avatarInitials}</div>
                                        <div>
                                            <div class="item-name" style="${isYou ? 'color: var(--accent-primary);' : ''}">${isYou ? 'You' : user.name}</div>
                                            <div class="item-subtitle">Discussion Participant</div>
                                        </div>
                                    </div>
                                </div>
                                <div class="item-right">
                                    <div class="item-score" style="${isYou ? 'color: var(--accent-primary);' : (rank > 3 ? 'color: #fff;' : '')}">${user.score}</div>
                                    <div class="item-score-label">Points</div>
                                </div>
                            </div>
                        `;
                        lbList.insertAdjacentHTML('beforeend', html);
                    });

                    // Set up realtime updates
                    if (!realtimeChannel) {
                        realtimeChannel = client.channel('discussion_lb_realtime')
                            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'discussion_points' }, () => {
                                loadLeaderboard(); // silently reload in background on new point
                            })
                            .subscribe();
                    }

                } catch (err) {
                    console.error("Leaderboard Error:", err);
                    lbList.innerHTML = '<div style="text-align:center; padding: 40px; color: #ef4444;">Failed to load leaderboard. Please make sure you have created the discussion_points table.</div>';
                }
            }

            loadLeaderboard();
        });
    </script>
</body>
</html>
